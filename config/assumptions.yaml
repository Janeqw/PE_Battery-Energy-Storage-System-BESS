# =============================================================================
# assumptions.yaml  —  every model assumption, with a source + date.
# -----------------------------------------------------------------------------
# DEAL: an ILLUSTRATIVE distribution-network battery *develop-and-flip* fund.
# The model is an INDEPENDENT rebuild; manager figures are CLAIMS to verify.
#
# CORRECTED GATE LOGIC (this rebuild):
#   The manager's 40 / 65 / 80% are the DEVELOPMENT-APPROVAL gate ONLY — not the
#   whole-funnel success. Each lifecycle gate is modelled SEPARATELY and the
#   scenarios move ONLY the development-approval gate. Overall success for any
#   path = the product of just the gates that path must clear:
#     Stage 1 (develop & flip)  : approval x grid connection x sale
#     Stage 2 (build & sell)     : construction completion  (buys past approval+connection)
#     Stage 3 (own & operate)    : none (merchant-price scenarios)
#     Stage 4 (integrated)       : approval x grid connection x construction (kept, not sold)
#
# We invest DIRECTLY as a SHAREHOLDER in one battery-developer startup (not as a
# fund limited partner). Valuation works back from the company's exit equity value
# (First-Chicago scenario weighting) and runs it through a CAP TABLE: pre-/post-
# money, our ownership %, dilution (option pool + future rounds) and a liquidation
# preference, to give the return on OUR shares.
#
# Every value is ILLUSTRATIVE / a documented public benchmark as at the stated
# date and MUST be re-verified. Live values (RBA yield) refresh via `make extract`.
# =============================================================================

meta:
  fund_name: "Illustrative Distribution-BESS Develop-and-Flip Fund (ILLUSTRATIVE — NOT A REAL FUND)"
  currency: "AUD"
  units: "$m unless stated"
  as_at: "2026-06-26"
  base_year: 2026
  horizon_years: 3            # 2+1 year develop-and-flip term
  exit_stage: "rtb"           # ready-to-build / development rights, sold pre-construction
  geography: ["NSW", "VIC", "SA"]
  notes: >
    Develop ~5 MW distribution batteries to shovel-ready (ready-to-build) and
    sell before construction. Merchant risk passes to the buyer; the fund's risk
    is the survival gates + the RTB exit price. Manager figures are claims to verify.

# -----------------------------------------------------------------------------
# 1. Discount rate / required return (VC method)
# -----------------------------------------------------------------------------
discount_rate:
  risk_free:
    value: 0.0420            # ~Australian 10yr CGS yield; refreshed from RBA F2
    source: "RBA Statistical Table F2 (Capital Market Yields — 10yr CGS)"
    as_at: "2026-06-26"
    verify: true
  risk_premium:
    value: 0.140            # development-stage equity risk premium (illustrative)
    source: "Renewable-development valuation guidance (illustrative); all-in base ~18%"
    as_at: "2026-06-26"
    verify: true
  # base discount (asset cross-checks) = risk_free + risk_premium (~0.182)

returns:
  vc_target_return:
    value: 0.250            # VC-method target return / discount rate for the exit-value PV
    source: "VC-method target return for development-stage equity (25%+); analyst judgement"
    as_at: "2026-06-26"
    verify: true

# -----------------------------------------------------------------------------
# 2. The COMPANY (the startup we buy shares in) — its development programme.
#    We invest directly as a shareholder (see §2b), NOT as a fund LP.
# -----------------------------------------------------------------------------
company:
  programme_capital_m: {value: 25.0, source: "Illustrative scale of the company's equity-funded development programme; verify", as_at: "2026-06-26", verify: true}
  projects_target:     {value: 35,   source: "Company plan — deliver & sell ~35 ready-to-build projects; verify", as_at: "2026-06-26", verify: true}
  term_years:          {value: 3,    source: "Company plan — ~2+1 year develop-and-flip programme cycle; verify", as_at: "2026-06-26"}
  capital_call_profile:  {value: [0.50, 0.50, 0.0, 0.0], source: "Illustrative — development spend in yrs 0-1", as_at: "2026-06-26"}
  distribution_profile:  {value: [0.0, 0.0, 0.50, 0.50], source: "Illustrative — programme proceeds in yrs 2-3", as_at: "2026-06-26"}

# -----------------------------------------------------------------------------
# 2b. DIRECT-EQUITY DEAL TERMS — we buy shares in the company.
#     PLACEHOLDERS to confirm with the founders / term sheet ([[TO CONFIRM]]).
# -----------------------------------------------------------------------------
equity_deal:
  pre_money_m:               {value: 8.0,  source: "[[TO CONFIRM]] PLACEHOLDER — the company's pre-money valuation (value before our money goes in)", as_at: "2026-06-26", verify: true}
  investment_amount_m:       {value: 2.0,  source: "[[TO CONFIRM]] PLACEHOLDER — our equity cheque", as_at: "2026-06-26", verify: true}
  option_pool_pct:           {value: 0.10, source: "[[TO CONFIRM]] PLACEHOLDER — staff option pool created at our round (dilutes us)", as_at: "2026-06-26", verify: true}
  future_round_dilution_pct: {value: 0.20, source: "[[TO CONFIRM]] PLACEHOLDER — expected dilution from future capital raises before exit", as_at: "2026-06-26", verify: true}
  liquidation_preference_x:  {value: 1.0,  source: "PLACEHOLDER — 1x non-participating preferred (the greater of our money back or our as-converted share); confirm in the term sheet", as_at: "2026-06-26", verify: true}
  exit_equity_multiple:      {value: 4.0,  source: "[[TO CONFIRM]] PLACEHOLDER — multiple on the company's modelled net programme profit to value it as a repeatable develop-and-flip platform at exit", as_at: "2026-06-26", verify: true}
  exit_year:                 {value: 5,    source: "[[TO CONFIRM]] PLACEHOLDER — years to our exit (we sell our shares)", as_at: "2026-06-26", verify: true}

# -----------------------------------------------------------------------------
# 3. Development cost & funnel attrition
# -----------------------------------------------------------------------------
dev_cost:
  per_project_m:        {value: 0.50, source: "Manager claim ~$500k/project — verify bottom-up", as_at: "2026-06-26", verify: true}
  abandonment_fraction: {value: 0.30, source: "Illustrative (conservative) — partial spend before a failed project is abandoned", as_at: "2026-06-26", verify: true}

# -----------------------------------------------------------------------------
# 4. SURVIVAL GATES — each modelled SEPARATELY (the corrected logic)
#    The SCENARIOS (§9) move ONLY the development-approval gate. The other gates
#    are fixed public-data benchmarks. Construction completion lives under §8.
# -----------------------------------------------------------------------------
gates:
  development_approval:        # planning / development approval — the gate the scenarios move
    independent: 0.80          # public-data planning-approval benchmark (for the independent cross-check)
    duration_years: 1.00
    source: "NSW/VIC/SA planning portals — small-BESS approval rate (benchmark). The manager's 40/65/80% are THIS gate."
    as_at: "2026-06-26"
    verify: true
  grid_connection:             # separate gate (the bottleneck)
    probability: 0.70
    duration_years: 1.25
    source: "AEMO Connections Scorecard / KCI; DNSP processes (benchmark)"
    as_at: "2026-06-26"
    verify: true
  reach_sale:                  # the flip exit gate (only paths that SELL bear it)
    probability: 0.80
    duration_years: 0.50
    source: "RTB buyer-pool depth + AEMO proposed->committed attrition (benchmark)"
    as_at: "2026-06-26"
    verify: true

# -----------------------------------------------------------------------------
# 5. RTB exit price ($/MW by state)  — manager claim; needs independent comps
#    Per 5 MW project: NSW ~$1.0m, VIC ~$0.9m, SA ~$0.6m.
# -----------------------------------------------------------------------------
rtb_comps_per_mw_m:
  NSW: 0.200
  VIC: 0.180
  SA:  0.120
  source: "Manager's assumed RTB prices by state (CLAIM). Independent comps needed; paid deal DBs out of scope."
  as_at: "2026-06-26"
  verify: true

# -----------------------------------------------------------------------------
# 6. Build-cost CONTEXT (buyer-funded; not in the fund's margin)
# -----------------------------------------------------------------------------
built_cost_context:
  per_mw_m: {value: 1.80, source: "CSIRO GenCost-anchored build cost; context only — the buyer funds construction", as_at: "2026-06-26", verify: true}

# -----------------------------------------------------------------------------
# 7. Illustrative project pipeline (representative ~5 MW distribution projects)
# -----------------------------------------------------------------------------
pipeline:
  n_projects: 6
  state_split: {NSW: 3, VIC: 2, SA: 1}
  projects:
    - {name: "Riverina 5MW BESS (illustrative)",      state: NSW, location: "Wagga Wagga, NSW",   mw: 5, duration_h: 2, years_to_sale: 2.5}
    - {name: "Hunter Edge 5MW BESS (illustrative)",   state: NSW, location: "Hunter Valley, NSW",  mw: 5, duration_h: 4, years_to_sale: 3.0}
    - {name: "Illawarra 5MW BESS (illustrative)",     state: NSW, location: "Wollongong, NSW",     mw: 5, duration_h: 2, years_to_sale: 2.0}
    - {name: "Latrobe 5MW BESS (illustrative)",       state: VIC, location: "Latrobe Valley, VIC", mw: 5, duration_h: 2, years_to_sale: 2.5}
    - {name: "Western Plains 5MW BESS (illustrative)",state: VIC, location: "Horsham, VIC",         mw: 5, duration_h: 2, years_to_sale: 2.0}
    - {name: "Mid-North 5MW BESS (illustrative)",     state: SA,  location: "Port Pirie, SA",       mw: 5, duration_h: 2, years_to_sale: 2.5}

# -----------------------------------------------------------------------------
# 8. Stage parameters (construction, operating) for Stages 2-4
# -----------------------------------------------------------------------------
stages:
  ref_project: {mw: 5, duration_h: 2, state: "NSW"}
  construction:
    build_cost_per_mw_m: 1.20
    build_years: 1.5
    gearing: 0.60
    debt_rate: 0.070
    completion_prob: 0.90      # the construction gate (Stages 2 & 4)
    salvage_on_failure: 0.50
    cost_overrun_downside: 0.15
    source: "CSIRO GenCost capex; project-finance norms (illustrative — verify)"
    as_at: "2026-06-26"
    verify: true
  operating:
    revenue_per_mw_yr_m: 0.220
    contracted_share: 0.50
    opex_per_mw_yr_m: 0.030
    degradation_pa: 0.02
    life_years: 15
    gearing: 0.55
    debt_rate: 0.070
    debt_tenor_years: 12
    terminal_ebitda_multiple: 6.0
    asset_discount: 0.08
    source: "AEMO QED price context; battery revenue-stack & infra norms (illustrative — verify)"
    as_at: "2026-06-26"
    verify: true
  operating_scenarios:
    low: 0.70
    base: 1.00
    high: 1.30
    weights: {low: 0.30, base: 0.50, high: 0.20}
  integrated:
    dev_to_rtb_years: 1.75
    note: >
      Stage 4 carries one project develop -> build -> operate and KEEPS it.
      Reach-operation = development approval x grid connection x construction
      completion (NO sale gate — the asset is kept). Bears development +
      construction + merchant risk over the longest horizon.

# -----------------------------------------------------------------------------
# 9. Scenarios — the switch moves ONLY the development-approval (DA) gate.
#    Overall flip success = DA x grid connection x sale (see §4).
#    DA rates 40/65/80% are the manager's claims (Conservative/Base/Ideal).
#    1=Conservative 2=Base 3=Ideal
# -----------------------------------------------------------------------------
scenarios:
  switch_default: 2
  cases:
    1: {name: "Conservative", da_rate: 0.40, sale_price_multiplier: 0.85, dev_cost_multiplier: 1.05}
    2: {name: "Base",         da_rate: 0.65, sale_price_multiplier: 1.00, dev_cost_multiplier: 1.00}
    3: {name: "Ideal",        da_rate: 0.80, sale_price_multiplier: 1.15, dev_cost_multiplier: 0.97}
  weights: {Conservative: 0.30, Base: 0.50, Ideal: 0.20}
