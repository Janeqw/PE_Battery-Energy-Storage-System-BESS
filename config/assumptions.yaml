# =============================================================================
# assumptions.yaml  —  every model assumption, with a source + date.
# -----------------------------------------------------------------------------
# DEAL: an ILLUSTRATIVE distribution-network battery *develop-and-flip* fund.
# The model is an INDEPENDENT rebuild; manager figures are CLAIMS to verify.
#
# CORRECTED GATE LOGIC (this rebuild):
#   The manager's 40 / 65 / 80% are the DEVELOPMENT-APPROVAL gate ONLY — not the
#   whole-funnel success. Each lifecycle gate is modelled SEPARATELY and the
#   scenarios move ONLY the development-approval gate. Overall success for any
#   path = the product of just the gates that path must clear:
#     Stage 1 (develop & flip)  : approval x grid connection x sale
#     Stage 2 (build & sell)     : construction completion  (buys past approval+connection)
#     Stage 3 (own & operate)    : none (merchant-price scenarios)
#     Stage 4 (integrated)       : approval x grid connection x construction (kept, not sold)
#
# We invest DIRECTLY as a SHAREHOLDER in one battery-developer startup (not as a
# fund limited partner). Valuation works back from the company's exit equity value
# (First-Chicago scenario weighting) and runs it through a CAP TABLE: pre-/post-
# money, our ownership %, dilution (option pool + future rounds) and a liquidation
# preference, to give the return on OUR shares.
#
# Every value is ILLUSTRATIVE / a documented public benchmark as at the stated
# date and MUST be re-verified. Live values (RBA yield) refresh via `make extract`.
# =============================================================================

# -----------------------------------------------------------------------------
# SOURCE-KEY SCHEME (change12) — every assumption carries a `source_key:` that
# links it to a declared register entry in config/sources.yaml (the machine link;
# the `source:` prose stays as the human note). Allowed values:
#   <key>                       — a real key under `sources:` in sources.yaml
#                                 (rba, csiro_gencost, nsw_planning, aemo_connections,
#                                  aemo_generation_info, trade_press_comps, aemo_isp, …)
#   context_only:<name>         — a context-only source (exact name from sources.yaml)
#   none  (+ judgement: true)   — NO declared public source backs this input:
#                                 analyst judgement, illustrative, company-plan,
#                                 placeholder, OR a manager claim pending verification.
#                                 The `provenance:` tag says which; a `none` input must
#                                 NOT name a public source in its `source:` prose.
# tests/test_sources_match.py enforces this so the two files cannot drift apart.
# -----------------------------------------------------------------------------

meta:
  fund_name: "Illustrative Distribution-BESS Develop-and-Flip Fund (ILLUSTRATIVE — NOT A REAL FUND)"
  currency: "AUD"
  units: "$m unless stated"
  as_at: "2026-06-26"
  base_year: 2026
  horizon_years: 3            # 2+1 year develop-and-flip term
  exit_stage: "rtb"           # ready-to-build / development rights, sold pre-construction
  geography: ["NSW", "VIC", "SA"]
  notes: >
    Develop ~5 MW distribution batteries to shovel-ready (ready-to-build) and
    sell before construction. Merchant risk passes to the buyer; the fund's risk
    is the survival gates + the RTB exit price. Manager figures are claims to verify.

# -----------------------------------------------------------------------------
# 1. Discount rate / required return (VC method)
# -----------------------------------------------------------------------------
discount_rate:
  risk_free:
    value: 0.0420            # ~Australian 10yr CGS yield; refreshed from RBA F2
    source_key: rba
    source: "RBA Statistical Table F2 (Capital Market Yields — 10yr CGS)"
    as_at: "2026-06-26"
    verify: true
  risk_premium:
    value: 0.140            # development-stage equity risk premium (illustrative)
    source_key: none
    judgement: true
    source: "Analyst judgement — development-stage equity risk premium (illustrative); all-in base ~18%"
    as_at: "2026-06-26"
    verify: true
  # base discount (asset cross-checks) = risk_free + risk_premium (~0.182)

returns:
  vc_target_return:
    value: 0.250            # VC-method target return / discount rate for the exit-value PV
    source_key: none
    judgement: true
    source: "VC-method target return for development-stage equity (25%+); analyst judgement"
    as_at: "2026-06-26"
    verify: true

# -----------------------------------------------------------------------------
# 2. The COMPANY (the startup we buy shares in) — its development programme.
#    We invest directly as a shareholder (see §2b), NOT as a fund LP.
# -----------------------------------------------------------------------------
company:
  programme_capital_m: {value: 25.0, provenance: "Placeholder", source_key: none, judgement: true, source_ref: "Illustrative scale; verify against the company plan", source: "Illustrative scale of the company's equity-funded development programme; verify", as_at: "2026-06-26", verify: true}
  projects_target:     {value: 35,   source_key: none, judgement: true, source: "Company plan — deliver & sell ~35 ready-to-build projects; verify", as_at: "2026-06-26", verify: true}
  term_years:          {value: 3,    source_key: none, judgement: true, source: "Company plan — ~2+1 year develop-and-flip programme cycle; verify", as_at: "2026-06-26"}
  capital_call_profile:  {value: [0.50, 0.50, 0.0, 0.0], source_key: none, judgement: true, source: "Illustrative — development spend in yrs 0-1", as_at: "2026-06-26"}
  distribution_profile:  {value: [0.0, 0.0, 0.50, 0.50], source_key: none, judgement: true, source: "Illustrative — programme proceeds in yrs 2-3", as_at: "2026-06-26"}

# -----------------------------------------------------------------------------
# 2b. DIRECT-EQUITY DEAL TERMS — we buy shares in the company.
#     PLACEHOLDERS to confirm with the founders / term sheet ([[TO CONFIRM]]).
# -----------------------------------------------------------------------------
equity_deal:
  pre_money_m:               {value: 8.0,  provenance: "Placeholder", source_key: none, judgement: true, source_ref: "Reframe placeholder we introduced (the original deal is an LP fund commitment with no pre-money / per-share price). Illustrative, not a manager figure.", source: "[[TO CONFIRM]] PLACEHOLDER — the company's pre-money valuation (value before our money goes in)", as_at: "2026-06-26", verify: true}
  investment_amount_m:       {value: 2.0,  provenance: "Placeholder", source_key: none, judgement: true, source_ref: "Illustrative cheque size (reframe placeholder); not a figure from any real proposal.", source: "[[TO CONFIRM]] PLACEHOLDER — our equity cheque", as_at: "2026-06-26", verify: true}
  option_pool_pct:           {value: 0.10, source_key: none, judgement: true, source: "[[TO CONFIRM]] PLACEHOLDER — staff option pool created at our round (dilutes us)", as_at: "2026-06-26", verify: true}
  future_round_dilution_pct: {value: 0.20, source_key: none, judgement: true, source: "[[TO CONFIRM]] PLACEHOLDER — expected dilution from future capital raises before exit", as_at: "2026-06-26", verify: true}
  liquidation_preference_x:  {value: 1.0,  source_key: none, judgement: true, source: "PLACEHOLDER — 1x non-participating preferred (the greater of our money back or our as-converted share); confirm in the term sheet", as_at: "2026-06-26", verify: true}
  exit_year:                 {value: 5,    source_key: none, judgement: true, source: "[[TO CONFIRM]] PLACEHOLDER — years to our exit (we sell our shares)", as_at: "2026-06-26", verify: true}

# -----------------------------------------------------------------------------
# 2c. EXIT VALUE — how the company's exit equity value is built at our exit.
#     PRIMARY basis = risk-adjusted FORWARD-PIPELINE value (rNPV): what a buyer of
#     a development PLATFORM actually pays is the forward pipeline of future
#     projects, NOT past profit already earned. The earnings multiple (§2d) and
#     any comparable deals are CROSS-CHECKS only — they no longer drive the memo.
#
#       Exit equity value (per scenario)
#         = rNPV of the projects still in the pipeline at exit (forward pipeline)
#         + net cash RETAINED on the balance sheet at exit (not yet distributed)
#         - any debt outstanding at exit
#
#     The forward pipeline rNPV uses the SAME gate decomposition (approval x grid
#     connection x sale) and the SAME discount rate as the rest of the model.
#     Double-count guard (see IC_MEMO §7): retained cash is realised profit NOT yet
#     distributed; the forward pipeline is FUTURE profit — neither is the other.
# -----------------------------------------------------------------------------
exit_value:
  exit_basis: "pipeline_rnpv"   # PRIMARY switch: pipeline_rnpv (default) | earnings_multiple | comps (cross-checks)
  pipeline_depth_at_exit:        {value: 25,  provenance: "Placeholder", source_key: none, judgement: true, source_ref: "Illustrative — projects in flight at exit; verify against the company's pipeline plan", source: "[[TO CONFIRM]] PLACEHOLDER — number of projects still IN FLIGHT (not yet sold) when we exit; the MAIN sensitivity of the pipeline basis (see Exhibit D). The company targets ~35 delivered over its programme.", as_at: "2026-06-26", verify: true}
  interim_distribution_fraction: {value: 0.0, provenance: "Placeholder", source_key: none, judgement: true, source_ref: "Illustrative (conservative 0%); confirm the distribution policy", source: "[[TO CONFIRM]] PLACEHOLDER — fraction of realised net programme profit DISTRIBUTED to shareholders during the hold (convention (b), IC_MEMO §7). 0% (conservative) retains all realised profit and counts it ONCE, at face value, in the exit value — never at a multiple. Raise once the distribution policy is confirmed.", as_at: "2026-06-26", verify: true}
  debt_at_exit_m:                {value: 0.0, provenance: "Placeholder", source_key: none, judgement: true, source_ref: "Illustrative ($0; equity-funded); confirm against the balance sheet", source: "[[TO CONFIRM]] PLACEHOLDER — company debt outstanding at exit; the company is equity-funded, so 0 by default.", as_at: "2026-06-26", verify: true}

# -----------------------------------------------------------------------------
# 2d. EXIT VALUE CROSS-CHECK — earnings multiple (NOT the primary basis).
#     A sanity check on §2c, applied to FORWARD RUN-RATE annual development profit
#     (the yearly stream an acquirer inherits) — NOT cumulative programme profit.
#     A lone, unsourced multiple must not drive the memo, so this is a sourced
#     low / base / high RANGE; each needs a comp or sector benchmark to confirm.
# -----------------------------------------------------------------------------
exit_value_crosscheck:
  earnings_multiple:
    low:  {value: 3.0, provenance: "Placeholder", source_key: none, judgement: true, source_ref: "[[TO CONFIRM: cite comp or sector benchmark]]", source: "low EV/earnings multiple for a development platform", as_at: "2026-06-26", verify: true}
    base: {value: 5.0, provenance: "Placeholder", source_key: none, judgement: true, source_ref: "[[TO CONFIRM: cite comp or sector benchmark]]", source: "base EV/earnings multiple for a development platform", as_at: "2026-06-26", verify: true}
    high: {value: 7.0, provenance: "Placeholder", source_key: none, judgement: true, source_ref: "[[TO CONFIRM: cite comp or sector benchmark]]", source: "high EV/earnings multiple for a development platform", as_at: "2026-06-26", verify: true}
  comps_available: false   # set true and add Appendix-A comps if credible comparable developer-platform M&A deals exist

# -----------------------------------------------------------------------------
# PROVENANCE SCHEME (change5) — every price/value input carries a `provenance:` tag:
#   "Proposed (manager)"     — the manager's stated figure: a CLAIM, UNVERIFIED.
#   "Independent (verified)"  — our own figure, checked against a primary source.
#   "Placeholder"             — neither yet ([[TO CONFIRM]] we still owe).
# The INDEPENDENT valuation (pipeline rNPV) may consume ONLY "Independent (verified)"
# inputs — the engine's contamination guard rejects the other two (see
# src/valuation_engine.py: assert_independent_inputs_verified). `source_ref:` gives
# the document/page or the primary source. A "Proposed (manager)" price must be
# verified against a primary source and re-tagged before it may enter the rNPV.
# -----------------------------------------------------------------------------
# 3. Development cost & funnel attrition
# -----------------------------------------------------------------------------
dev_cost:
  per_project_m:        {value: 0.50, provenance: "Proposed (manager)", source_key: none, judgement: true, source_ref: "Manager deck/IM — not in repo; ~$500k/project is a claim to verify bottom-up", source: "Manager claim ~$500k/project — verify bottom-up", as_at: "2026-06-26", verify: true}
  abandonment_fraction: {value: 0.30, provenance: "Placeholder", source_key: none, judgement: true, source_ref: "Illustrative (conservative) — set bottom-up", source: "Illustrative (conservative) — partial spend before a failed project is abandoned", as_at: "2026-06-26", verify: true}

# -----------------------------------------------------------------------------
# 4. SURVIVAL GATES — each modelled SEPARATELY (the corrected logic)
#    The SCENARIOS (§9) move ONLY the development-approval gate. The other gates
#    are fixed public-data benchmarks. Construction completion lives under §8.
# -----------------------------------------------------------------------------
gates:
  development_approval:        # planning / development approval — the gate the scenarios move
    independent: 0.80          # public-data planning-approval benchmark (for the independent cross-check)
    duration_years: 1.00
    source_key: nsw_planning
    source: "NSW Planning Portal — small-BESS approval rate (benchmark); VIC/SA are policy context only (not approval-rate data). The manager's 40/65/80% are THIS gate."
    as_at: "2026-06-26"
    verify: true
  # Grid connection — RTB-stage connection RIGHTS gate (NOT energisation):
  # the probability a development project secures the connection AGREEMENT + Generator
  # Performance Standards (GPS) needed to be genuinely ready-to-build — the connection
  # paperwork a buyer requires before paying RTB price. A pre-construction milestone
  # (AEMO Connections Scorecard "registration / executed connection agreement" stage),
  # NOT the physical hookup/commissioning of a built battery.
  grid_connection:
    probability: 0.70          # [[TO CONFIRM]] benchmark for the application->connection-agreement rate
    duration_years: 1.25
    source_key: aemo_connections
    source: "AEMO Connections Scorecard / KCI — share of development projects securing a connection AGREEMENT + GPS (RTB-stage 'registration / executed connection agreement' milestone; ready-for-construction), NOT commissioning/energisation of built plant. ~70% is a documented benchmark [[TO CONFIRM]] (the Scorecard's ~75% 'commissioned to full output' is a DIFFERENT, downstream milestone). Gate 3 (sale) covers buyer/price risk, not connection."
    as_at: "2026-06-26"
    verify: true
  reach_sale:                  # the flip exit gate (only paths that SELL bear it)
    probability: 0.80
    duration_years: 0.50
    source_key: aemo_generation_info
    source: "AEMO Generation Information — proposed->committed attrition (benchmark); RTB buyer-pool depth is judgement context."
    as_at: "2026-06-26"
    verify: true

# -----------------------------------------------------------------------------
# 5. RTB exit price ($/MW by state)  — manager claim; needs independent comps
#    Per 5 MW project: NSW ~$1.0m, VIC ~$0.9m, SA ~$0.6m.
# -----------------------------------------------------------------------------
rtb_comps_per_mw_m:
  NSW: 0.200
  VIC: 0.180
  SA:  0.120
  provenance: "Proposed (manager)"
  source_key: trade_press_comps
  source_ref: "Manager's assumed RTB $/MW (deck/IM — not in repo). Independent comps needed (comparable RTB sales); paid deal DBs (BNEF/Enerdatics/Mergermarket) out of scope. VERIFY before this may enter the independent rNPV."
  source: "Manager's assumed RTB prices by state (CLAIM). Independent comps (trade_press_comps) needed; paid deal DBs out of scope."
  as_at: "2026-06-26"
  verify: true

# -----------------------------------------------------------------------------
# 6. Build-cost CONTEXT (buyer-funded; not in the fund's margin)
#    Mismatch 3 (change12): $1.80m is an ALL-IN built-asset value ABOVE the GenCost
#    2-hr CELL cost (~$1.05-1.16m/MW). It has no primary source, so it is a
#    Placeholder / [[TO CONFIRM]] — NOT "Independent (verified)". Used only in the
#    RTB-vs-built cross-check (context); never in the rNPV margin.
# -----------------------------------------------------------------------------
built_cost_context:
  per_mw_m: {value: 1.80, provenance: "Placeholder", source_key: csiro_gencost, source_ref: "CSIRO GenCost is the reference for the 2-hr CELL cost (~$1.05-1.16m/MW); $1.80m is an ALL-IN built-asset value ABOVE that — no primary source. [[TO CONFIRM]].", source: "[[TO CONFIRM]] all-in built-asset value (above the GenCost cell cost ~$1.1m/MW); context only — the buyer funds construction (not in the rNPV margin).", as_at: "2026-06-26", verify: true}

# -----------------------------------------------------------------------------
# 7. Illustrative project pipeline (representative ~5 MW distribution projects)
#    Synthetic (not a real portfolio); sizes/locations grounded in public battery
#    data but the pipeline itself is an analyst construction.
# -----------------------------------------------------------------------------
pipeline:
  source_key: none
  judgement: true
  source: "Illustrative representative pipeline; sizes/locations synthetic (not a real portfolio)."
  n_projects: 6
  state_split: {NSW: 3, VIC: 2, SA: 1}
  projects:
    - {name: "Riverina 5MW BESS (illustrative)",      state: NSW, location: "Wagga Wagga, NSW",   mw: 5, duration_h: 2, years_to_sale: 2.5}
    - {name: "Hunter Edge 5MW BESS (illustrative)",   state: NSW, location: "Hunter Valley, NSW",  mw: 5, duration_h: 4, years_to_sale: 3.0}
    - {name: "Illawarra 5MW BESS (illustrative)",     state: NSW, location: "Wollongong, NSW",     mw: 5, duration_h: 2, years_to_sale: 2.0}
    - {name: "Latrobe 5MW BESS (illustrative)",       state: VIC, location: "Latrobe Valley, VIC", mw: 5, duration_h: 2, years_to_sale: 2.5}
    - {name: "Western Plains 5MW BESS (illustrative)",state: VIC, location: "Horsham, VIC",         mw: 5, duration_h: 2, years_to_sale: 2.0}
    - {name: "Mid-North 5MW BESS (illustrative)",     state: SA,  location: "Port Pirie, SA",       mw: 5, duration_h: 2, years_to_sale: 2.5}

# -----------------------------------------------------------------------------
# 8. Stage parameters (construction, operating) for Stages 2-4
# -----------------------------------------------------------------------------
stages:
  ref_project: {mw: 5, duration_h: 2, state: "NSW"}
  construction:
    build_cost_per_mw_m: 1.20
    build_years: 1.5
    gearing: 0.60
    debt_rate: 0.070
    completion_prob: 0.90      # the construction gate (Stages 2 & 4)
    salvage_on_failure: 0.50
    cost_overrun_downside: 0.15
    source_key: csiro_gencost
    source: "CSIRO GenCost capex anchor (build_cost_per_mw_m); gearing/debt/completion params are illustrative judgement — verify."
    as_at: "2026-06-26"
    verify: true
  operating:
    revenue_per_mw_yr_m: 0.220
    contracted_share: 0.50
    opex_per_mw_yr_m: 0.030
    degradation_pa: 0.02
    life_years: 15
    gearing: 0.55
    debt_rate: 0.070
    debt_tenor_years: 12
    terminal_ebitda_multiple: 6.0
    asset_discount: 0.08
    source_key: "context_only:AEMO — Quarterly Energy Dynamics (QED)"
    source: "AEMO QED price context; revenue-stack & infra params are illustrative judgement — verify."
    as_at: "2026-06-26"
    verify: true
  operating_scenarios:
    low: 0.70
    base: 1.00
    high: 1.30
    weights: {low: 0.30, base: 0.50, high: 0.20}
  integrated:
    dev_to_rtb_years: 1.75
    note: >
      Stage 4 carries one project develop -> build -> operate and KEEPS it.
      Reach-operation = development approval x grid connection x construction
      completion (NO sale gate — the asset is kept). Bears development +
      construction + merchant risk over the longest horizon.

# -----------------------------------------------------------------------------
# 8b. VALUE LADDER (change8) — staged-exit valuation. We own the company as its
#     projects climb the lifecycle and choose WHEN to sell our shares:
#       R1 sell after approval (ready-to-build)   <- reuses Stage-1 / develop-flip
#       R2 sell after construction (built asset)  <- reuses Stage-2 build & sell
#       R3 sell after operating (stabilised)      <- reuses Stage-3/4 operating
#     Option A = clean milestone exits (our ownership % held constant; ignores the
#     capital needed to climb). Option B = full hold WITH funding (new equity to
#     build/operate dilutes us; debt sits ahead of equity). Both are computed; the
#     gap between them is the "funding drag". Years to R2 = years_to_r1 +
#     construction.build_years; years to R3 = that + operating_ramp_years.
# -----------------------------------------------------------------------------
value_ladder:
  headline_mode: "A"   # which option leads the memo; both are always computed
  years_to_r1:        {value: 2.5,  provenance: "Placeholder", source_key: none, judgement: true, source_ref: "years to a ready-to-build sale", source: "[[TO CONFIRM]] years to RTB sale", as_at: "2026-06-29", verify: true}
  operating_ramp_years: {value: 3.0, provenance: "Placeholder", source_key: none, judgement: true, source_ref: "operating hold before selling a stabilised asset (R3)", source: "[[TO CONFIRM]] operating ramp before R3 sale", as_at: "2026-06-29", verify: true}
  stabilised_premium: {value: 0.10, provenance: "Placeholder", source_key: none, judgement: true, source_ref: "value uplift of a stabilised, track-record asset vs a just-built one (R3 vs R2)", source: "[[TO CONFIRM]] stabilised-asset premium", as_at: "2026-06-29", verify: true}
  equity_dilution_r2: {value: 0.70, provenance: "Placeholder", source_key: none, judgement: true, source_ref: "our dilution from the equity the company raises to fund CONSTRUCTION (Option B)", source: "[[TO CONFIRM]] equity raised to build dilutes us", as_at: "2026-06-29", verify: true}
  equity_dilution_r3: {value: 0.50, provenance: "Placeholder", source_key: none, judgement: true, source_ref: "further dilution from equity raised to OPERATE (Option B), on top of R2", source: "[[TO CONFIRM]] equity raised to operate dilutes us further", as_at: "2026-06-29", verify: true}

# -----------------------------------------------------------------------------
# 9. Scenarios — the switch moves ONLY the development-approval (DA) gate.
#    Overall flip success = DA x grid connection x sale (see §4).
#    DA rates 40/65/80% are the manager's claims (Conservative/Base/Ideal).
#    1=Conservative 2=Base 3=Ideal
#    source_key: none — the DA rates are the manager's CLAIM (Proposed (manager));
#    the approval gate itself is benchmarked in gates.development_approval (nsw_planning).
# -----------------------------------------------------------------------------
scenarios:
  switch_default: 2
  source_key: none
  judgement: true
  cases:
    1: {name: "Conservative", da_rate: 0.40, sale_price_multiplier: 0.85, dev_cost_multiplier: 1.05}
    2: {name: "Base",         da_rate: 0.65, sale_price_multiplier: 1.00, dev_cost_multiplier: 1.00}
    3: {name: "Ideal",        da_rate: 0.80, sale_price_multiplier: 1.15, dev_cost_multiplier: 0.97}
  weights: {Conservative: 0.30, Base: 0.50, Ideal: 0.20}
