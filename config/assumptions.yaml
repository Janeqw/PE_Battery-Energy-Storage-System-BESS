# =============================================================================
# assumptions.yaml  —  every model assumption, with a source + date.
# -----------------------------------------------------------------------------
# DEAL: an ILLUSTRATIVE distribution-network BESS *develop-and-flip* fund, framed
# on the an illustrative develop-and-flip battery storage fund (a real opportunity the investor may
# back as an LP). Every the manager figure is the MANAGER'S forward-looking CLAIM; the
# model is an INDEPENDENT rebuild — these inputs are the analyst's own, sourced
# to public data or labelled illustrative, and clearly separated from the manager's.
#
# The business (carry this reframe everywhere):
#   The fund develops ~5 MW distribution-connected (≈22 kV) batteries to
#   shovel-ready (RTB / development rights) and SELLS them before construction.
#   It never operates the asset, so MERCHANT-PRICE RISK PASSES TO THE BUYER.
#   The fund's risk is the SURVIVAL CURVE (approve -> connect -> sell) and the
#   RTB EXIT PRICE — not operating cash flows.
#
# Every value is ILLUSTRATIVE / a documented public benchmark as at the stated
# date and MUST be re-verified before any real use. Live values (e.g. RBA yield)
# are refreshed by `make extract` where reachable.
# =============================================================================

meta:
  fund_name: "Illustrative Distribution-BESS Develop-and-Flip Fund (ILLUSTRATIVE — NOT A REAL FUND)"
  framed_on: "an illustrative develop-and-flip battery storage fund (manager claims independently rebuilt — not endorsed)"
  currency: "AUD"
  units: "$m unless stated"
  as_at: "2026-06-24"
  base_year: 2026
  horizon_years: 3            # 2+1 year develop-and-flip term
  exit_stage: "rtb"           # ready-to-build / development rights, sold pre-construction
  geography: ["NSW", "VIC", "SA"]   # eastern NEM
  notes: >
    Develop-and-flip RTB model: develop ~5 MW distribution BESS to shovel-ready,
    sell the project companies before construction. Merchant risk passes to the
    buyer; the fund's risk is the survival curve + the RTB exit price. the manager's
    figures are claims to verify; independent public-data findings sit alongside.

# -----------------------------------------------------------------------------
# 1. Discount rate  (Calc_Project_rNPV)   discount = risk_free + risk_premium
# -----------------------------------------------------------------------------
discount_rate:
  risk_free:
    value: 0.0420            # ~Australian 10yr CGS yield; refreshed from RBA F2
    source: "RBA Statistical Table F2 (Capital Market Yields — 10yr CGS)"
    as_at: "2026-06-24"
    verify: true
  risk_premium:
    value: 0.140            # development-stage equity risk premium (illustrative)
    source: "Renewable-development valuation guidance: early-stage dev hurdles ~20%+; premium so all-in base ~18%"
    as_at: "2026-06-24"
    verify: true
  # discount_rate_base is computed in-model = risk_free + risk_premium (~0.182)

# -----------------------------------------------------------------------------
# 2. Returns / VC method  (Calc_CrossChecks)
# -----------------------------------------------------------------------------
returns:
  vc_target_return:
    value: 0.250            # 25%+ for development-stage equity (VC-like risk) — VC cross-check
    source: "VC-method target return for development-stage equity (25%+ / ~2.5-3x MOIC) — analyst judgement"
    as_at: "2026-06-24"
    verify: true

# -----------------------------------------------------------------------------
# 3. Fund structure, fees & investor cash-flow profile  (Calc_Fund, Returns)
#    The LP economics. the manager terms are CLAIMS — read the IM for the real terms.
# -----------------------------------------------------------------------------
fund:
  committed_capital_m:
    value: 25.0            # LP committed capital (the manager fund ~$25m) — CLAIM/illustrative
    source: "the manager's projections (claim) — fund size ~$25m; verify in the Information Memorandum"
    as_at: "2026-06-24"
    verify: true
  projects_target:
    value: 35              # projects DELIVERED & SOLD (the manager: deliver ~38, sell 30-35)
    source: "the manager's projections (claim) — sell 30-35 of ~38 delivered; verify"
    as_at: "2026-06-24"
    verify: true
  term_years:
    value: 3               # 2+1 year term / lock-up
    source: "the manager's projections (claim) — 2+1 year term; verify in the IM"
    as_at: "2026-06-24"
  fees:
    entry_fee_pct:    0.02   # one-off entry fee on committed capital
    mgmt_fee_pct_pa:  0.02   # annual management fee on committed capital
    carry_pct:        0.20   # carried interest over the hurdle
    hurdle_pct:       0.08   # 8% preferred return (hurdle for carry)
    source: "the manager's projections (claim) — 2% entry + 2%/yr mgmt + 20% carry over 8% hurdle; verify in the IM"
    as_at: "2026-06-24"
    verify: true
  # Investor cash-flow timing across periods 0..3 (must each sum to 1.0):
  capital_call_profile:
    value: [0.50, 0.50, 0.0, 0.0]   # calls in yrs 0-1 (development)
    source: "Illustrative — development capital called over the build-out period"
    as_at: "2026-06-24"
  distribution_profile:
    value: [0.0, 0.0, 0.50, 0.50]   # distributions in yrs 2-3 (the 2+1 exit window)
    source: "Illustrative — RTB sales realised across the 2-3 year exit window"
    as_at: "2026-06-24"

# -----------------------------------------------------------------------------
# 4. Development cost & funnel attrition  (Calc_Fund)
#    Funnel: projects_started = projects_target / cumulative_P(success).
#    You spend FULL dev cost on delivered projects + a partial 'screening' spend
#    on the ones that drop out (stage-weighted attrition) — credit-style.
# -----------------------------------------------------------------------------
dev_cost:
  per_project_m:
    value: 0.50            # $m full development cost per delivered project (~$500k)
    source: "the manager's projections (claim ~$500k/project) — verify bottom-up: site+EIA+grid+community+overhead"
    as_at: "2026-06-24"
    verify: true
  abandonment_fraction:
    value: 0.30            # failed projects sink ~30% of full dev cost before dropping out
    source: "Illustrative (conservative) — partial spend before a project is abandoned"
    as_at: "2026-06-24"
    verify: true

# -----------------------------------------------------------------------------
# 5. Survival curve / gate probabilities  (Calc_Survival)
#    Cumulative P(success) = p_planning * p_connection * p_sale  (INDEPENDENT
#    public-data decomposition). Note this ~0.45 sits BELOW the manager's Base (0.65)
#    — surfaced as a flag on Calc_Survival. Scenarios (below) set the success
#    rate used in valuation; this curve is the independent benchmark.
#    Computed by src/transform/gate_statistics.py; values below are the
#    documented fallback benchmarks when sources are unreachable.
# -----------------------------------------------------------------------------
gates:
  planning_approval:
    probability: 0.80      # share of small BESS DAs reaching determination that are approved
    duration_years: 1.00
    source: "NSW/VIC/SA planning portals — approved vs refused/withdrawn small BESS (benchmark)"
    as_at: "2026-06-24"
    verify: true
  grid_connection:
    probability: 0.70      # share securing distribution connection (the bottleneck; sub-5MW exemption may lift this)
    duration_years: 1.25
    source: "AEMO Connections Scorecard / KCI; DNSP processes (benchmark). Sub-5MW AEMO registration exemption may improve this — verify."
    as_at: "2026-06-24"
    verify: true
  reach_sale:
    probability: 0.80      # given approved + connected, share that complete an RTB sale
    duration_years: 0.50
    source: "RTB buyer-pool depth + AEMO proposed->committed attrition (benchmark)"
    as_at: "2026-06-24"
    verify: true
  # independent cumulative P(success) = 0.80*0.70*0.80 = 0.448

# -----------------------------------------------------------------------------
# 6. RTB exit price ($/MW by state)  (Inputs; Calc_Project_rNPV & Calc_Fund)
#    Full development-rights (RTB) sale value per MW the buyer pays. the manager's
#    assumed prices (CLAIMS) — find INDEPENDENT comps before relying on them.
#    Per 5 MW project: NSW ~$1.0m, VIC ~$0.9m, SA ~$0.6m.
# -----------------------------------------------------------------------------
rtb_comps_per_mw_m:            # $m per MW (RTB / development rights)
  NSW: 0.200                   # $0.18-0.22/MW  -> ~$0.9-1.1m per 5 MW
  VIC: 0.180                   # $0.16-0.20/MW  -> ~$0.8-1.0m per 5 MW
  SA:  0.120                   # $0.10-0.14/MW  -> ~$0.5-0.7m per 5 MW
  source: "the manager's projections assumed RTB prices by state (CLAIM). Independent comps needed; paid deal DBs out of scope."
  as_at: "2026-06-24"
  verify: true

# -----------------------------------------------------------------------------
# 7. Build-cost CONTEXT (NOT in the fund's margin — the buyer funds construction)
#    Used only for the 'RTB as % of built value' sense-check on Calc_CrossChecks.
# -----------------------------------------------------------------------------
built_cost_context:
  per_mw_m:
    value: 1.80            # ~$8-10m per 5 MW / 10 MWh built asset (~$1.6-2.0m/MW)
    source: "CSIRO GenCost-anchored build cost; context only — the buyer (not the fund) funds construction"
    as_at: "2026-06-24"
    verify: true

# -----------------------------------------------------------------------------
# 8. Illustrative project pipeline  (representative ~5 MW distribution projects)
#    src/transform/clean_pipeline.py builds pipeline.csv from these params. The
#    fund funnel (Calc_Fund) scales this representative set up to projects_target
#    using the state mix below. Sizes mirror small distribution BESS (illustrative).
# -----------------------------------------------------------------------------
pipeline:
  n_projects: 6
  state_split: {NSW: 3, VIC: 2, SA: 1}
  projects:
    - {name: "Riverina 5MW BESS (illustrative)",     state: NSW, location: "Wagga Wagga, NSW",   mw: 5, duration_h: 2, years_to_sale: 2.5}
    - {name: "Hunter Edge 5MW BESS (illustrative)",  state: NSW, location: "Hunter Valley, NSW",  mw: 5, duration_h: 4, years_to_sale: 3.0}
    - {name: "Illawarra 5MW BESS (illustrative)",    state: NSW, location: "Wollongong, NSW",     mw: 5, duration_h: 2, years_to_sale: 2.0}
    - {name: "Latrobe 5MW BESS (illustrative)",      state: VIC, location: "Latrobe Valley, VIC", mw: 5, duration_h: 2, years_to_sale: 2.5}
    - {name: "Western Plains 5MW BESS (illustrative)",state: VIC, location: "Horsham, VIC",        mw: 5, duration_h: 2, years_to_sale: 2.0}
    - {name: "Mid-North 5MW BESS (illustrative)",    state: SA,  location: "Port Pirie, SA",       mw: 5, duration_h: 2, years_to_sale: 2.5}

# -----------------------------------------------------------------------------
# 9. Scenarios  (Scenarios tab; single CHOOSE switch drives the live-case row)
#    Each scenario is defined PRIMARILY by the CUMULATIVE SUCCESS RATE (the
#    master driver), plus an RTB price multiplier, a dev-cost multiplier and a
#    discount override. Success rates mirror the manager's deck (40/65/80%) so the
#    rebuild is directly comparable — but note the INDEPENDENT survival curve
#    (~45%) sits below the manager's Base (65%): see the flag on Calc_Survival.
#    1=Conservative 2=Base 3=Ideal
# -----------------------------------------------------------------------------
scenarios:
  switch_default: 2
  cases:
    1:
      name: "Conservative"
      cum_success: 0.40           # manager conservative case (claim)
      sale_price_multiplier: 0.85 # RTB prices compress; buyers cautious
      dev_cost_multiplier: 1.05
      discount_rate_override: 0.220
    2:
      name: "Base"
      cum_success: 0.65           # manager base case (claim) — ABOVE the independent ~45%
      sale_price_multiplier: 1.00
      dev_cost_multiplier: 1.00
      discount_rate_override: null  # null -> use risk_free + risk_premium (~0.182)
    3:
      name: "Ideal"
      cum_success: 0.80           # manager ideal case (claim)
      sale_price_multiplier: 1.15
      dev_cost_multiplier: 0.97
      discount_rate_override: 0.160
  # First-Chicago probability weights for the expected return (must sum to 1):
  weights: {Conservative: 0.30, Base: 0.50, Ideal: 0.20}

# -----------------------------------------------------------------------------
# 10. THREE-STAGE VALUE-CHAIN ANALYSIS  (src/stage_analysis.py)
#     Compares the three ways to invest along the chain, on a per-reference-asset
#     basis, as risk-adjusted LEVERED EQUITY returns:
#       Stage 1  Develop & flip  — win approvals, sell RTB (the fund we modelled)
#       Stage 2  Build & sell    — buy RTB, construct, sell the operating asset
#       Stage 3  Own & operate   — buy/own the operating asset, run it ~15 yrs
#     ALL figures here are ILLUSTRATIVE benchmarks (the analyst's to OWN): battery
#     revenue and capex are uncertain and merchant-driven. Sources noted; verify.
# -----------------------------------------------------------------------------
stages:
  ref_project:                 # one representative asset for the per-asset comparison
    mw: 5
    duration_h: 2              # -> 10 MWh
    state: "NSW"              # RTB value uses rtb_comps_per_mw_m[NSW]

  construction:                # Stage 2 — buy RTB, build, sell the operating asset
    build_cost_per_mw_m: 1.20  # installed capex $m/MW (2h; CSIRO GenCost-anchored, declining)
    build_years: 1.5
    gearing: 0.60              # construction debt as % of total project cost
    debt_rate: 0.070
    completion_prob: 0.90      # P(reach commercial operation)
    salvage_on_failure: 0.50   # fraction of equity recovered if a project fails to complete
    cost_overrun_downside: 0.15  # +15% capex in the downside case
    source: "CSIRO GenCost capex; project-finance market norms (illustrative — verify)"
    as_at: "2026-06-24"
    verify: true

  operating:                   # Stage 3 — own & operate the asset
    revenue_per_mw_yr_m: 0.220 # net trading + FCAS revenue $m/MW/yr (merchant, base year)
    contracted_share: 0.50     # share of revenue under a toll/offtake (stable, not merchant-scaled)
    opex_per_mw_yr_m: 0.030
    degradation_pa: 0.02       # annual revenue decline (capacity fade / market)
    life_years: 15
    gearing: 0.55              # operating-asset debt as % of acquisition value
    debt_rate: 0.070
    debt_tenor_years: 12
    terminal_ebitda_multiple: 6.0  # EV/EBITDA on final-year EBITDA (residual at exit)
    asset_discount: 0.08       # unlevered discount rate to value the operating asset (infra)
    source: "AEMO QED price context; battery revenue-stack & infra debt/return norms (illustrative — verify)"
    as_at: "2026-06-24"
    verify: true

  operating_scenarios:         # merchant-revenue scenarios (multiplier on the MERCHANT portion)
    low: 0.70
    base: 1.00
    high: 1.30
    weights: {low: 0.30, base: 0.50, high: 0.20}

  integrated:                  # Stage 4 — develop -> build -> operate the SAME asset (vertically integrated)
    dev_to_rtb_years: 1.75     # greenfield -> ready-to-build lead (no sale step; the project is kept)
    note: >
      You carry one project the whole way: develop it, build it, then own & operate it ~15 years.
      Development survival for an integrated owner = planning approval x grid connection ONLY — the
      'reach sale' gate does not apply because you keep the asset rather than sell it. Captures the
      whole value chain (development + construction margin + operating yield) but bears development,
      construction AND merchant-price risk over the longest horizon. Illustrative — verify.
